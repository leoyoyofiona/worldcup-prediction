eight:330px;border-radius:999px;background:#f7d1cb;opacity:.58}.orb2{position:absolute;left:-160px;bottom:-120px;width:380px;height:380px;border-radius:999px;background:#d9ead8;opacity:.72}.mock{position:absolute;left:70px;right:70px;top:435px;height:560px;border-radius:32px;background:#fff;border:2px solid var(--line);box-shadow:0 24px 54px rgba(45,52,48,.12);overflow:hidden}.mock img{width:100%;height:100%;object-fit:cover;object-position:left top}.big-number{font-size:118px;line-height:.95;font-weight:1000;color:var(--green)}
