services:
  - type: web
    name: worldcup-prediction
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/status
    envVars:
      - key: TOURNAMENT_SIMULATIONS
        value: "300"
      - key: VISITOR_BASELINE_COUNT
        value: "10"
      - key: VISITOR_COUNTER_BACKEND
        value: "local"
