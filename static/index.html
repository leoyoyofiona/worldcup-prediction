<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2026 男足世界杯预测</title>
    <link rel="stylesheet" href="static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>2026 男足世界杯预测</h1>
        <p id="statusLine">正在读取模型状态...</p>
      </div>
      <div class="toolbar">
        <button id="updateBtn" class="primary">更新数据</button>
        <button id="recalcBtn">重新计算模型</button>
        <button id="sourcesBtn">来源状态</button>
      </div>
    </header>

    <main class="shell">
      <section class="content">
        <div class="summary-grid" id="summaryGrid">
          <div class="metric"><span>比赛</span><strong>--</strong></div>
          <div class="metric"><span>球队</span><strong>--</strong></div>
          <div class="metric"><span>历史样本</span><strong>--</strong></div>
          <div class="metric"><span>市场热度</span><strong>--</strong></div>
        </div>

        <section class="tournament-panel">
          <div class="panel-head">
            <h2>淘汰赛推演</h2>
            <span id="simulationCount">--</span>
          </div>
          <div id="championStrip" class="champion-strip"></div>
          <div id="stageGrid" class="stage-grid"></div>
          <div id="bracketGrid" class="bracket-grid"></div>
        </section>

        <div class="filters">
          <label>
            阶段
            <select id="roundFilter"></select>
          </label>
          <label>
            球队
            <select id="teamFilter"></select>
          </label>
          <label>
            置信度
            <select id="confidenceFilter">
              <option value="">全部</option>
              <option value="高">高</option>
              <option value="中">中</option>
              <option value="低">低</option>
              <option value="待定">待定</option>
            </select>
          </label>
          <label class="search-box">
            搜索
            <input id="searchInput" type="search" placeholder="球队 / 场地" />
          </label>
        </div>

        <div id="notice" class="notice hidden"></div>
        <div class="match-list" id="matchList"></div>
      </section>

      <aside class="detail-panel" id="detailPanel">
        <div class="empty-detail">
          <h2>未选择比赛</h2>
        </div>
      </aside>
    </main>

    <div id="sourceDrawer" class="drawer hidden">
      <div class="drawer-backdrop" id="drawerBackdrop"></div>
      <section class="drawer-panel">
        <div class="drawer-head">
          <h2>来源状态</h2>
          <button id="closeDrawerBtn">关闭</button>
        </div>
        <div id="sourceList" class="source-list"></div>
      </section>
    </div>

    <script src="static/app.js"></script>
  </body>
</html>
