<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2026 男足世界杯预测</title>
    <link rel="icon" href="static/assets/leo-logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="static/styles.css?v=20260721-review-visuals" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-lockup">
        <img class="brand-logo" src="static/assets/leo-logo.svg" alt="LEO Logo" />
        <div>
          <h1 data-i18n="appTitle">2026 男足世界杯预测</h1>
          <p id="statusLine" data-i18n="loadingStatus">正在读取模型状态...</p>
        </div>
      </div>
      <div class="toolbar">
        <button id="updateBtn" class="primary" data-i18n="updateData">更新数据并重算</button>
        <button id="reviewBtn" data-i18n="reviewButton">统计回顾</button>
        <button id="sourcesBtn" data-i18n="sourceStatus">来源状态</button>
      </div>
    </header>

    <section class="legal-disclaimer" aria-label="法律免责声明">
      <strong>法律免责声明</strong>
      <span>本程序仅供足球爱好者进行预测分析和统计分析，不作为博彩投注、彩票购买或任何资金决策的参考依据。请理性观赛，风险自担。</span>
    </section>

    <section class="visitor-counter" aria-label="访问统计">
      <div class="visitor-card visitor-card-primary">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <span>累计访问</span>
        <strong id="visitorTotal">--</strong>
      </div>
      <div class="visitor-card visitor-card-secondary">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <path d="M16 2v4" />
          <path d="M8 2v4" />
          <path d="M3 10h18" />
        </svg>
        <span>今日访问</span>
        <strong id="visitorToday">--</strong>
      </div>
      <p id="visitorNote">正在统计访问热度...</p>
    </section>

    <main class="shell">
      <section class="content">
        <div class="summary-grid" id="summaryGrid">
          <div class="metric"><span>比赛</span><strong>--</strong></div>
          <div class="metric"><span>球队</span><strong>--</strong></div>
          <div class="metric"><span>历史样本</span><strong>--</strong></div>
          <div class="metric"><span>市场热度</span><strong>--</strong></div>
        </div>

        <section class="review-panel hidden" id="reviewPanel">
          <div class="panel-head">
            <h2 data-i18n="reviewTitle">统计回顾</h2>
            <span id="reviewTag">--</span>
          </div>
          <p id="reviewSummary" class="review-summary">世界杯结束后，这里会汇总全部预测表现。</p>
          <div id="reviewMetrics" class="review-metrics"></div>
          <div id="reviewCharts" class="review-charts"></div>
          <div id="reviewStageTable" class="review-stage-table"></div>
        </section>

        <section class="performance-panel">
          <div class="panel-head">
            <h2 data-i18n="performanceTitle">真实赛果对比</h2>
            <span id="performanceTag">--</span>
          </div>
          <div id="performanceGrid" class="performance-grid"></div>
          <div id="resultComparison" class="comparison-table"></div>
        </section>

        <section class="tournament-panel">
          <div class="panel-head">
            <h2 data-i18n="tournamentTitle">淘汰赛推演</h2>
            <span id="simulationCount">--</span>
          </div>
          <div id="championStrip" class="champion-strip"></div>
          <div id="stageGrid" class="stage-grid"></div>
          <div id="bracketGrid" class="bracket-grid"></div>
        </section>

        <section class="betting-panel">
          <div class="panel-head">
            <h2 data-i18n="bettingValueTitle">当日比赛分析预测</h2>
            <span id="bettingDayTag">--</span>
          </div>
          <div id="bettingNote" class="comparison-note"></div>
          <div id="bettingList" class="betting-list"></div>
        </section>

        <section class="support-panel">
          <div class="support-copy">
            <h2>理性观赛，感谢支持！</h2>
            <p>如果这个世界杯预测工具对你有帮助，欢迎自愿打赏支持维护。</p>
          </div>
          <div class="support-qr-grid">
            <div class="support-qr-card">
              <img src="static/assets/tip-alipay.jpg" alt="支付宝打赏收款码" loading="lazy" />
              <strong>支付宝</strong>
            </div>
            <div class="support-qr-card">
              <img src="static/assets/tip-wechat.jpg" alt="微信打赏收款码" loading="lazy" />
              <strong>微信</strong>
            </div>
          </div>
        </section>

        <div class="filters">
          <label>
            <span data-i18n="round">阶段</span>
            <select id="roundFilter"></select>
          </label>
          <label>
            <span data-i18n="team">球队</span>
            <select id="teamFilter"></select>
          </label>
          <label>
            <span data-i18n="confidence">置信度</span>
            <select id="confidenceFilter">
              <option value="" data-i18n="all">全部</option>
              <option value="高" data-i18n="high">高</option>
              <option value="中" data-i18n="medium">中</option>
              <option value="低" data-i18n="low">低</option>
              <option value="待定" data-i18n="pending">待定</option>
            </select>
          </label>
          <label class="search-box">
            <span data-i18n="search">搜索</span>
            <input id="searchInput" type="search" placeholder="球队 / 场地" data-i18n-placeholder="searchPlaceholder" />
          </label>
        </div>

        <div id="notice" class="notice hidden"></div>
        <div class="match-list" id="matchList"></div>
      </section>

      <aside class="detail-panel" id="detailPanel">
        <div class="empty-detail">
          <h2 data-i18n="noMatchSelected">未选择比赛</h2>
        </div>
      </aside>
    </main>

    <div id="sourceDrawer" class="drawer hidden">
      <div class="drawer-backdrop" id="drawerBackdrop"></div>
      <section class="drawer-panel">
        <div class="drawer-head">
          <h2 data-i18n="sourceStatus">来源状态</h2>
          <button id="closeDrawerBtn" data-i18n="close">关闭</button>
        </div>
        <div id="sourceList" class="source-list"></div>
      </section>
    </div>

    <script src="static/app.js?v=20260721-review-visuals"></script>
  </body>
</html>
